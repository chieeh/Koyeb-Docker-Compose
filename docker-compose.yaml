services:
  cloudflared:
    image: "cloudflare/cloudflared:latest"
    container_name: cloudflared
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    restart: unless-stopped

  sub2sing:
    image: nite07/sub2sing-box
    container_name: sub2sing
    ports:
      - "4000:8080"
    restart: unless-stopped